<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <link rel="stylesheet" href="Test.css">
    <title>Afrekenen | GameCycle</title>
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Hoofdnavigatie">
            <a class="brand" href="index.html"><span class="brand-mark">GC</span><span>GameCycle</span></a>
            <div class="nav-links">
                <a href="Producten.html">Games</a>
                <a href="Service.html">Service</a>
                <a href="Contact.html">Contact</a>
            </div>
            <span class="cart-button">Items <span data-cart-count>0</span></span>
        </nav>
    </header>
    <main>
        <section class="page-hero checkout-hero">
            <p class="eyebrow">Checkout</p>
            <h1>Rond je bestelling veilig af.</h1>
        </section>
        <section class="section checkout-layout">
            <div>
                <h2>Je bestelling</h2>
                <div class="cart-items" data-cart-items></div>
                <div class="totals"><span>Totaal</span><strong data-cart-total>EUR 0,00</strong></div>
            </div>
            <form class="checkout" data-checkout-form>
                <label>Naam<input type="text" name="customerName" required></label>
                <label>E-mail<input type="email" name="customerEmail" required></label>
                <label>Adres<input type="text" name="customerAddress" required></label>
                <label>Betaalmethode<select name="paymentMethod" required><option>iDEAL</option><option>PayPal</option><option>Creditcard</option></select></label>
                <label class="terms"><input type="checkbox" name="acceptTerms" required> Ik accepteer de algemene voorwaarden en het retourbeleid.</label>
                <button class="button primary full" type="submit">Bestelling plaatsen</button>
                <p class="order-info">Je mailprogramma opent om de bestelling te versturen. Verstuur de e-mail om je bestelling echt af te ronden.</p>
                <p class="order-message" data-order-message role="status"></p>
            </form>
        </section>
    </main>
    <script src="shop.js"></script>
</body>
</html>
